<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Global</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      background:#111827;
      padding:22px;
      border-radius:18px;
      width:92%;
      max-width:540px;
    }

    h2{text-align:center;}

    textarea,select,button{
      width:100%;
      margin-top:10px;
      padding:12px;
      border-radius:10px;
      border:none;
      font-size:14px;
    }

    textarea{
      min-height:90px;
      background:#0f172a;
      color:white;
    }

    select{background:#0f172a;color:white;}

    button{
      background:#3b82f6;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .row{display:flex;gap:10px;}
    .row button{flex:1;}

    #output{
      margin-top:15px;
      padding:12px;
      background:#0f172a;
      border-radius:10px;
      min-height:70px;
    }

    /* CHAT */
    #chatBox{
      position:fixed;
      bottom:70px;
      right:10px;
      width:260px;
      background:#0f172a;
      padding:10px;
      border-radius:12px;
      display:none;
    }

    #chatMessages{
      height:140px;
      overflow-y:auto;
      background:#111827;
      padding:6px;
      border-radius:8px;
    }

    #chatInput{
      width:100%;
      padding:8px;
      margin-top:5px;
      border-radius:8px;
      border:none;
      background:#111827;
      color:white;
    }

    /* BUTTON */
    #chatToggle{
      position:fixed;
      bottom:10px;
      right:10px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:#3b82f6;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      font-size:22px;
    }

    /* LOGIN */
    #loginBox{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#111827;
      padding:20px;
      border-radius:12px;
      display:none;
      width:260px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator 50 Global</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <button onclick="openLogin()">Login</button>

  <div id="output"></div>
</div>

<!-- CHAT -->
<div id="chatBox">
  <b>💬 Chat</b>
  <div id="chatMessages"></div>
  <input id="chatInput">
  <button onclick="sendChat()">Senden</button>
</div>

<!-- CHAT BUTTON -->
<div id="chatToggle" onclick="toggleChat()">💬</div>

<!-- LOGIN -->
<div id="loginBox">
  <b>Username</b>
  <input id="usernameInput">
  <button onclick="saveUsername()">Speichern</button>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain: "projekt-erstellen-dfc13.firebaseapp.com",
  projectId: "projekt-erstellen-dfc13",
  storageBucket: "projekt-erstellen-dfc13.firebasestorage.app",
  messagingSenderId: "1040865035180",
  appId: "1:1040865035180:web:273c7c1998d9b57664f009"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const chatRef = db.collection("chat");

let username = localStorage.getItem("username") || "";
let lastResult = "";

/* 🌍 50 SPRACHEN */
const languages = {
  en:"Englisch", de:"Deutsch", fr:"Französisch", es:"Spanisch",
  it:"Italienisch", pt:"Portugiesisch", ru:"Russisch", zh:"Chinesisch",
  ja:"Japanisch", ko:"Koreanisch", ar:"Arabisch", hi:"Hindi",
  fa:"Persisch", ur:"Urdu", bn:"Bengalisch", tr:"Türkisch",
  vi:"Vietnamesisch", id:"Indonesisch", pl:"Polnisch", uk:"Ukrainisch",
  nl:"Niederländisch", el:"Griechisch", sv:"Schwedisch", da:"Dänisch",
  fi:"Finnisch", no:"Norwegisch", cs:"Tschechisch", ro:"Rumänisch",
  hu:"Ungarisch", he:"Hebräisch", th:"Thailändisch", ms:"Malaiisch",
  tl:"Filipino", sw:"Swahili", ta:"Tamil", te:"Telugu",
  ml:"Malayalam", kn:"Kannada", pa:"Punjabi", mr:"Marathi",
  ne:"Nepalesisch", si:"Singhalesisch", my:"Burmesisch", km:"Khmer",
  lo:"Laotisch", am:"Amharisch", az:"Aserbaidschanisch", so:"Somali",
  zu:"Zulu", yo:"Yoruba"
};

function loadLanguages(){
  let f=document.getElementById("fromLang");
  let t=document.getElementById("toLang");

  for(let c in languages){
    f.add(new Option(languages[c],c));
    t.add(new Option(languages[c],c));
  }
}

/* TRANSLATE */
async function translateText(){
  let text=document.getElementById("text").value;
  let from=document.getElementById("fromLang").value;
  let to=document.getElementById("toLang").value;

  let res=await fetch(
    "https://api.mymemory.translated.net/get?q="+
    encodeURIComponent(text)+
    "&langpair="+from+"|"+to
  );

  let data=await res.json();
  lastResult=data.responseData.translatedText;
  output.innerText=lastResult;
}

/* VEREINFACHEN */
function simplifyText(){
  let text = lastResult || document.getElementById("text").value || "";
  let sentences = text.split(/[.!?]/).map(s=>s.trim()).filter(Boolean);

  let keep = Math.max(1, Math.ceil(sentences.length * 0.5));

  let result = sentences.slice(0,keep).join(". ");

  output.innerText="VEREINFACHT:\n\n"+result+".";
}

/* ZUSAMMENFASSEN */
function summarizeText(){
  let text = lastResult || document.getElementById("text").value || "";
  let sentences = text.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>20);

  let first = sentences[0] || text;
  let longest = sentences.sort((a,b)=>b.length-a.length)[0] || "";

  let summary = first;
  if(longest!==first) summary += ". "+longest;

  output.innerText="ZUSAMMENFASSUNG:\n\n"+summary+".";
}

/* CHAT */
function toggleChat(){
  let box=document.getElementById("chatBox");
  box.style.display = box.style.display==="none"?"block":"none";
}

function openLogin(){
  document.getElementById("loginBox").style.display="block";
}

function saveUsername(){
  username=document.getElementById("usernameInput").value;
  localStorage.setItem("username",username);
  document.getElementById("loginBox").style.display="none";
}

function sendChat(){
  let msg=document.getElementById("chatInput").value;
  if(!msg || !username) return;

  chatRef.add({
    text:msg,
    user:username,
    time:Date.now()
  });

  chatInput.value="";
}

function loadChat(){
  chatRef.orderBy("time").onSnapshot(snap=>{
    let box=document.getElementById("chatMessages");
    box.innerHTML="";
    snap.forEach(d=>{
      let data=d.data();
      let div=document.createElement("div");
      div.innerText="👤 "+data.user+": "+data.text;
      box.appendChild(div);
    });
  });
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  loadLanguages();
  loadChat();
});

</script>

</body>
</html>
