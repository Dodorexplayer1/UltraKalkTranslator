<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator AI Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator AI Pro</h2>

  <textarea id="text" placeholder="Text eingeben"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<script>

let lastResult = "";

// 🌍 100+ Sprachen automatisch laden
async function loadLanguages(){
  let from = document.getElementById("fromLang");
  let to = document.getElementById("toLang");

  try{
    let res = await fetch("https://libretranslate.de/languages");
    let langs = await res.json();

    langs.forEach(l => {
      let o1 = document.createElement("option");
      let o2 = document.createElement("option");

      o1.value = l.code;
      o1.textContent = l.name;

      o2.value = l.code;
      o2.textContent = l.name;

      from.appendChild(o1);
      to.appendChild(o2);
    });

  }catch(e){
    document.getElementById("output").innerText =
      "Sprachen konnten nicht geladen werden";
  }
}

// 🌍 Übersetzen (JETZT beliebig FROM → TO)
async function translateText(){
  let text = document.getElementById("text").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try{
    let chunks = [];

    for(let i = 0; i < text.length; i += 400){
      chunks.push(text.substring(i, i + 400));
    }

    let result = "";

    for(let chunk of chunks){
      let res = await fetch(
        "https://api.mymemory.translated.net/get?q="
        + encodeURIComponent(chunk)
        + "&langpair=" + from + "|" + to
      );

      let data = await res.json();
      result += data.responseData.translatedText + " ";
    }

    lastResult = result;
    document.getElementById("output").innerText = result;

  }catch(e){
    document.getElementById("output").innerText =
      "Fehler beim Übersetzen";
  }
}

// 🧠 Vereinfachen (arbeitet auf Ergebnis)
function simplifyText(){
  let text = lastResult || document.getElementById("text").value;

  let result = text
    .replace(/kompliziert|schwierig|durchgeführt|implementiert/gi, "gemacht")
    .replace(/Kommunikation/gi, "Austausch")
    .replace(/Transformation/gi, "Veränderung")
    .replace(/andererseits/gi, "aber")
    .replace(/daher|deshalb|somit/gi, "darum");

  document.getElementById("output").innerText = result;
}

// 🧠 Zusammenfassen (arbeitet auf Ergebnis)
function summarizeText(){
  let text = lastResult || document.getElementById("text").value;

  let sentences = text.split(".").map(s => s.trim()).filter(s => s.length > 10);

  if(sentences.length <= 2){
    document.getElementById("output").innerText = text;
    return;
  }

  let summary = [
    sentences[0],
    sentences[Math.floor(sentences.length / 2)],
    sentences[sentences.length - 1]
  ].join(". ") + ".";

  document.getElementById("output").innerText = summary;
}

window.onload = loadLanguages;

</script>

</body>
</html>
