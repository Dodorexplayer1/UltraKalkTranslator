<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain: "projekt-erstellen-dfc13.firebaseapp.com",
  projectId: "projekt-erstellen-dfc13",
  storageBucket: "projekt-erstellen-dfc13.firebasestorage.app",
  messagingSenderId: "1040865035180",
  appId: "1:1040865035180:web:273c7c1998d9b57664f009"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const chatRef = db.collection("chat");
const imgRef = db.collection("images");

/* STATE */
let isGuest = false;
let guestUser = "";
let currentUsername = "";
let chatOpen = false;
let chatUnlocked = false;
let imageUnlocked = false;

let lastTranslated = "";
let translationHistory = [];
let chatUnsubscribe = null;

/* CODES */
const CHAT_CODE = "$01$";
const IMAGE_CODE = "IloveCodeGeass";

/* =========================
   APP START FIX
========================= */
function enterApp(){
  loginScreen.style.display = "none";
  app.style.display = "block";

  loadChat();
}

/* =========================
   AUTH FIX
========================= */
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then((userCredential)=>{
      currentUsername =
        username.value?.trim() ||
        userCredential.user.email.split("@")[0];

      enterApp();
    })
    .catch(e=>alert(e.message));
}

function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then((userCredential)=>{
      currentUsername =
        username.value?.trim() ||
        userCredential.user.email.split("@")[0];

      enterApp();
    })
    .catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
  if(user || isGuest){
    enterApp();
  } else {
    loginScreen.style.display = "flex";
    app.style.display = "none";
  }
});

function logout(){
  isGuest = false;
  guestUser = "";
  currentUsername = "";
  auth.signOut();
}

/* =========================
   GUEST FIX
========================= */
function guestLogin(){
  if(!guestName.value.trim()) return;

  isGuest = true;
  guestUser = guestName.value.trim();

  enterApp();
}

/* =========================
   MENU
========================= */
function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.display = (m.style.display === "block") ? "none" : "block";
}

/* =========================
   CHAT CODE PROTECTION
========================= */
function askChatCode(){
  const c = prompt("Chat Code?");
  if(c === CHAT_CODE){
    chatUnlocked = true;
    toggleChat();
  } else {
    alert("Wrong code");
  }
}

function toggleChat(){
  if(!chatUnlocked){
    askChatCode();
    return;
  }

  chatOpen = !chatOpen;

  chatBox.style.display = chatOpen ? "block" : "none";
  chatInputBox.style.display = chatOpen ? "block" : "none";

  if(chatOpen){
    setTimeout(()=>{
      chatBox.scrollTop = chatBox.scrollHeight;
    }, 50);
  }
}

/* =========================
   CHAT SYSTEM FIX
========================= */
function loadChat(){

  if(chatUnsubscribe) chatUnsubscribe();

  chatUnsubscribe = chatRef.orderBy("time","asc").onSnapshot(snap=>{
    chatBox.innerHTML = "";

    let count = 0;

    snap.forEach(d=>{
      count++;

      const div = document.createElement("div");
      div.style.padding = "4px";
      div.innerText = d.data().user + ": " + d.data().text;

      chatBox.appendChild(div);
    });

    updateMenuInfo();

    requestAnimationFrame(()=>{
      chatBox.scrollTop = chatBox.scrollHeight;
    });
  });
}

function sendChat(){
  const msg = chatInput.value;
  if(!msg.trim()) return;

  const user =
    isGuest ? guestUser :
    (currentUsername || auth.currentUser?.email);

  chatRef.add({
    text: msg,
    user: user,
    time: Date.now()
  });

  chatInput.value = "";
}

/* =========================
   IMAGE SYSTEM FIX
========================= */
function askImageCode(){
  const c = prompt("Image Code?");
  if(c === IMAGE_CODE){
    imageUnlocked = true;
    imagePanel.style.display = "block";
    loadImages();
  } else {
    alert("Wrong code");
  }
}

function uploadImage(){
  if(!imageUnlocked) return;

  const file = imgUpload.files[0];
  const reader = new FileReader();

  reader.onload = ()=>{
    imgRef.add({
      img: reader.result,
      user: currentUsername || guestUser || "anon",
      time: Date.now()
    });
  };

  reader.readAsDataURL(file);
}

function loadImages(){
  imgRef.orderBy("time","desc").onSnapshot(snap=>{
    gallery.innerHTML = "";

    snap.forEach(d=>{
      const img = document.createElement("img");
      img.src = d.data().img;
      gallery.appendChild(img);
    });
  });
}

/* =========================
   TRANSLATE FIX
========================= */
async function translateText(){

  const text = document.getElementById("text").value;
  const from = fromLang.value;
  const to = toLang.value;

  const res = await fetch(
    `https://api.mymemory.translated.net/get?q=${text}&langpair=${from}|${to}`
  );

  const data = await res.json();

  lastTranslated = data.responseData.translatedText;

  translationHistory.unshift({from,to});
  if(translationHistory.length > 10) translationHistory.pop();

  output.innerText = lastTranslated;
}

function simplifyText(){
  const base = lastTranslated || text.value;
  output.innerText = "SIMPLIFIED:\n" + base.split(".")[0];
}

function summarizeText(){
  const base = lastTranslated || text.value;
  output.innerText = "SUMMARY:\n" + base.split(" ").slice(0,20).join(" ") + "...";
}

/* =========================
   MENU INFO FIX
========================= */
function updateMenuInfo(){

  const now = new Date();
  const reset = new Date();
  reset.setHours(24,0,0,0);

  const diff = reset - now;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);

  const recent =
    translationHistory.length > 0
    ? translationHistory[0].from + " → " + translationHistory[0].to
    : "none";

  menuInfo.innerText =
`⏱ Reset: ${h}h ${m}m
🌍 Recent: ${recent}`;
}

setInterval(updateMenuInfo, 60000);

/* =========================
   SETTINGS
========================= */
function openSettings(){
  output.innerText = "Settings";
}

function openHelp(){
  output.innerText = "Help & Support";
}

function openInfo(){
  output.innerText =
`System Active
Chat + Translate OK`;
}

/* =========================
   LANGUAGES
========================= */
const languages = {
en:"Englisch",de:"Deutsch",fr:"Französisch",es:"Spanisch",
it:"Italienisch",pt:"Portugiesisch",ru:"Russisch",zh:"Chinesisch",
ja:"Japanisch",ko:"Koreanisch"
};

function loadLanguages(){
  for(let c in languages){
    fromLang.add(new Option(languages[c],c));
    toLang.add(new Option(languages[c],c));
  }
}

document.addEventListener("DOMContentLoaded", loadLanguages);

</script>
