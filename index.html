<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Stable</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
      position: relative;
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
      white-space: pre-wrap;
    }

    /* 🔥 MENU */
    .menu-icon {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
      user-select: none;
    }

    .menu {
      position: absolute;
      top: 40px;
      right: 10px;
      background: #111827;
      border-radius: 10px;
      width: 180px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .menu div {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #1f2937;
    }

    .menu div:hover {
      background: #1f2937;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- 🔥 MENU BUTTON -->
  <div class="menu-icon" onclick="toggleMenu()">|||</div>

  <div id="menu" class="menu hidden">
    <div onclick="openSettings()">Settings</div>
    <div onclick="openLogin()">Login</div>
    <div onclick="openSupport()">Help & Support</div>
    <div onclick="openRules()">Regeln</div>
  </div>

  <h2>Ultra Translator 50 Stable</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<script>

let lastResult = "";

/* 🌍 50 Sprachen (BEIBEHALTEN) */
const languages = {
  en:"Englisch", de:"Deutsch", fr:"Französisch", es:"Spanisch",
  it:"Italienisch", pt:"Portugiesisch", ru:"Russisch", zh:"Chinesisch",
  ja:"Japanisch", ko:"Koreanisch", ar:"Arabisch", hi:"Hindi",
  fa:"Persisch", ur:"Urdu", bn:"Bengalisch", tr:"Türkisch",
  vi:"Vietnamesisch", id:"Indonesisch", pl:"Polnisch", uk:"Ukrainisch",
  nl:"Niederländisch", el:"Griechisch", sv:"Schwedisch", da:"Dänisch",
  fi:"Finnisch", no:"Norwegisch", cs:"Tschechisch", ro:"Rumänisch",
  hu:"Ungarisch", he:"Hebräisch", th:"Thailändisch", ms:"Malaiisch",
  tl:"Filipino", sw:"Swahili", ta:"Tamil", te:"Telugu",
  ml:"Malayalam", kn:"Kannada", pa:"Punjabi", mr:"Marathi",
  ne:"Nepalesisch", si:"Singhalesisch", my:"Burmesisch", km:"Khmer",
  lo:"Laotisch", am:"Amharisch", az:"Aserbaidschanisch", so:"Somali",
  zu:"Zulu", yo:"Yoruba"
};

/* LOAD */
function loadLanguages(){
  const from = document.getElementById("fromLang");
  const to = document.getElementById("toLang");

  from.innerHTML = "";
  to.innerHTML = "";

  for(let code in languages){
    from.add(new Option(languages[code], code));
    to.add(new Option(languages[code], code));
  }
}

/* TRANSLATE */
async function translateText(){
  let text = document.getElementById("text").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try{
    let res = await fetch(
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=" + from + "|" + to
    );

    let data = await res.json();

    lastResult = data?.responseData?.translatedText || text;

    document.getElementById("output").innerText = lastResult;

  }catch(e){
    document.getElementById("output").innerText = "Fehler beim Übersetzen";
  }
}

/* VEREINFACHEN */
function simplifyText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let result = text
    .replace(/sehr|wirklich|ziemlich|eigentlich|relativ|komplex/gi,"")
    .replace(/\s+/g," ")
    .trim();

  document.getElementById("output").innerText =
    "VEREINFACHT:\n\n" + result;
}

/* ZUSAMMENFASSEN */
function summarizeText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let sentences = text.split(".").map(s => s.trim()).filter(Boolean);

  let keep = Math.max(1, Math.ceil(sentences.length * 0.3));

  document.getElementById("output").innerText =
    "ZUSAMMENFASSUNG:\n\n" +
    sentences.slice(0, keep).join(". ") + ".";
}

/* 🔥 MENU FUNCTIONS */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("hidden");
}

function openSettings(){
  document.getElementById("output").innerText =
    "Settings:\n- Sprache\n- UI Optionen\n- zukünftige Features";
}

function openLogin(){
  document.getElementById("output").innerText =
    "Login:\n(noch nicht verbunden mit Backend)";
}

function openSupport(){
  document.getElementById("output").innerText =
    "Help & Support:\nWenn Fehler auftreten, Seite neu laden";
}

function openRules(){
  document.getElementById("output").innerText =
    "Regeln:\n1. Text eingeben\n2. Sprache wählen\n3. Keine leeren Anfragen";
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadLanguages);

</script>

</body>
</html>
