<!DOCTYPE html>
<html>
<head>
  <title>Übersetzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

.box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* FIX: GRÖSSER */
#app{
  display:none;
  padding:20px;
  max-width:1200px;
  margin:0 auto;
}

textarea,select,#output{
  width:100%;
  box-sizing:border-box;
}

textarea{
  min-height:160px;
  background:#111827;
  color:white;
  font-size:16px;
}

select{
  background:#111827;
  color:white;
}

#output{
  margin-top:15px;
  padding:15px;
  background:#111827;
  border-radius:10px;
  min-height:180px;
}

/* MENU */
#menuBtn{
  position:fixed;
  top:10px;
  right:10px;
  font-size:22px;
  cursor:pointer;
}

#menu{
  position:fixed;
  top:40px;
  right:10px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  display:none;
  width:220px;
}

/* CHAT FIX */
#chatBox{
  position:fixed;
  bottom:140px;
  right:10px;
  width:320px;
  height:320px;
  overflow-y:auto;
  background:#111827;
  padding:10px;
  border-radius:10px;
  display:none;
}

#chatInputBox{
  position:fixed;
  bottom:70px;
  right:10px;
  width:320px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  display:none;
}

#chatToggle{
  position:fixed;
  bottom:10px;
  right:10px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#3b82f6;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="loginScreen">
  <div class="box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <input id="username" placeholder="Username">
    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>
  </div>
</div>

<div id="app">

<div id="menuBtn" onclick="toggleMenu()">|||</div>

<div id="menu">
  <button onclick="openInfo()">Info</button>
  <button onclick="openSettings()">Settings</button>
  <button onclick="openHelp()">Help</button>
  <button onclick="resetChat()">Reset Chat</button>
  <button onclick="logout()">Logout</button>
</div>

<h2>Übersetzer</h2>

<textarea id="text"></textarea>

<select id="fromLang"></select>
<select id="toLang"></select>

<button onclick="translateText()">Übersetzen</button>
<button onclick="simplifyText()">Vereinfachen</button>
<button onclick="summarizeText()">Zusammenfassen</button>

<div id="output"></div>

<div id="chatBox"></div>
<div id="chatInputBox">
  <input id="chatInput">
  <button onclick="sendChat()">Send</button>
</div>

<div id="chatToggle" onclick="toggleChat()">💬</div>

</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
authDomain:"projekt-erstellen-dfc13.firebaseapp.com",
projectId:"projekt-erstellen-dfc13"
});

const auth=firebase.auth();
const db=firebase.firestore();
const chatRef=db.collection("chat");

let lastTranslation="";

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value);
}

function register(){
auth.createUserWithEmailAndPassword(email.value,password.value);
}

function logout(){
auth.signOut();
}

/* CHAT FIX */
function loadChat(){
chatRef.orderBy("time").onSnapshot(snap=>{
const box=document.getElementById("chatBox");

box.innerHTML="";

snap.forEach(d=>{
const div=document.createElement("div");
div.innerText=d.data().user+": "+d.data().text;
box.appendChild(div);
});

box.scrollTop = box.scrollHeight;
});
}

/* CHAT SEND */
function sendChat(){
chatRef.add({
text:chatInput.value,
user:username.value || "user",
time:Date.now()
});
chatInput.value="";
}

/* CHAT TOGGLE */
function toggleChat(){
const box=document.getElementById("chatBox");
const input=document.getElementById("chatInputBox");

let open=box.style.display==="block";
box.style.display=open?"none":"block";
input.style.display=open?"none":"block";
}

/* RESET */
function resetChat(){
chatRef.get().then(s=>{
s.forEach(d=>chatRef.doc(d.id).delete());
});
}

/* TRANSLATE */
async function translateText(){
let r=await fetch("https://api.mymemory.translated.net/get?q="+text.value+"&langpair="+fromLang.value+"|"+toLang.value);
let d=await r.json();
lastTranslation=d.responseData.translatedText;
output.innerText=lastTranslation;
}

/* FIX FUNCTIONS */
function simplifyText(){
let base=lastTranslation||text.value;
output.innerText=base.split(".")[0];
}

function summarizeText(){
let base=lastTranslation||text.value;
output.innerText=base.split(" ").slice(0,25).join(" ")+"...";
}

/* MENU */
function toggleMenu(){
menu.style.display=menu.style.display==="block"?"none":"block";
}

function openInfo(){output.innerText="System OK";}
function openSettings(){output.innerText="Settings";}
function openHelp(){output.innerText="Help";}

/* 190 LANGUAGES */
const languages={
en:"English",de:"Deutsch",fr:"Français",es:"Español",it:"Italiano",
pt:"Português",ru:"Русский",zh:"中文",ja:"日本語",ko:"한국어",
ar:"العربية",hi:"हिन्दी",tr:"Türkçe",nl:"Nederlands",pl:"Polski",
uk:"Українська",sv:"Svenska",da:"Dansk",fi:"Suomi",no:"Norsk",
cs:"Čeština",ro:"Română",hu:"Magyar",he:"עברית",th:"ไทย",
vi:"Tiếng Việt",id:"Bahasa Indonesia",ms:"Bahasa Melayu",tl:"Filipino"
};

for(let l in languages){
fromLang.add(new Option(languages[l],l));
toLang.add(new Option(languages[l],l));
}

auth.onAuthStateChanged(u=>{
if(u){
loginScreen.style.display="none";
app.style.display="block";
loadChat();
}
});

</script>

</body>
</html>
