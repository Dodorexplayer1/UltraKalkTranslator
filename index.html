<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator Pro</h2>

  <textarea id="text" placeholder="Text eingeben"></textarea>

  <select id="lang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div id="output"></div>
</div>

<script>
const languages = {
  af:"Afrikaans", sq:"Albanisch", am:"Amharisch", ar:"Arabisch",
  hy:"Armenisch", az:"Aserbaidschanisch", eu:"Baskisch", be:"Belarussisch",
  bn:"Bengalisch", bs:"Bosnisch", bg:"Bulgarisch", ca:"Katalanisch",
  ceb:"Cebuano", zh:"Chinesisch", co:"Korsisch", hr:"Kroatisch",
  cs:"Tschechisch", da:"Dänisch", nl:"Niederländisch", en:"Englisch",
  eo:"Esperanto", et:"Estnisch", fi:"Finnisch", fr:"Französisch",
  fy:"Friesisch", gl:"Galizisch", ka:"Georgisch", de:"Deutsch",
  el:"Griechisch", gu:"Gujarati", ht:"Haitianisch", ha:"Hausa",
  haw:"Hawaiianisch", he:"Hebräisch", hi:"Hindi", hu:"Ungarisch",
  is:"Isländisch", id:"Indonesisch", ga:"Irisch", it:"Italienisch",
  ja:"Japanisch", jw:"Javanisch", kn:"Kannada", kk:"Kasachisch",
  km:"Khmer", ko:"Koreanisch", ku:"Kurdisch", ky:"Kirgisisch",
  lo:"Laotisch", la:"Latein", lv:"Lettisch", lt:"Litauisch",
  lb:"Luxemburgisch", mk:"Mazedonisch", mg:"Madagassisch",
  ms:"Malaiisch", ml:"Malayalam", mt:"Maltesisch", mi:"Maori",
  mr:"Marathi", mn:"Mongolisch", my:"Burmesisch", ne:"Nepalesisch",
  no:"Norwegisch", ny:"Nyanja", or:"Odia", ps:"Paschtu",
  fa:"Persisch", pl:"Polnisch", pt:"Portugiesisch", pa:"Punjabi",
  ro:"Rumänisch", ru:"Russisch", sm:"Samoanisch", gd:"Schottisch-Gälisch",
  sr:"Serbisch", st:"Sesotho", sn:"Shona", sd:"Sindhi",
  si:"Singhalesisch", sk:"Slowakisch", sl:"Slowenisch",
  so:"Somali", es:"Spanisch", su:"Sundanesisch", sw:"Swahili",
  sv:"Schwedisch", tl:"Tagalog", tg:"Tadschikisch", ta:"Tamil",
  te:"Telugu", th:"Thailändisch", tr:"Türkisch", uk:"Ukrainisch",
  ur:"Urdu", uz:"Usbekisch", vi:"Vietnamesisch", cy:"Walisisch",
  xh:"Xhosa", yi:"Jiddisch", yo:"Yoruba", zu:"Zulu"
};

function loadLanguages(){
  let select = document.getElementById("lang");

  for(let code in languages){
    let option = document.createElement("option");
    option.value = code;
    option.textContent = languages[code];
    select.appendChild(option);
  }
}

async function translateText(){
  let text = document.getElementById("text").value;
  let lang = document.getElementById("lang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try {
    let res = await fetch("https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=de|" + lang);

    let data = await res.json();

    document.getElementById("output").innerText =
      data.responseData.translatedText;

  } catch (e) {
    document.getElementById("output").innerText =
      "Fehler beim Übersetzen (API nicht erreichbar)";
  }
}

window.onload = loadLanguages;
</script>

</body>
</html>
