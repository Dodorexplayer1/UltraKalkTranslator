<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator</title>
</head>
<body>

<h1>Ultra Translator</h1>

<textarea id="text" placeholder="Text eingeben"></textarea>

<select id="lang">
  <option value="en">Englisch</option>
  <option value="es">Spanisch</option>
  <option value="fr">Französisch</option>
</select>

<button onclick="translateText()">Übersetzen</button>

<p id="output"></p>

<script>
async function translateText() {
  let text = document.getElementById("text").value;
  let lang = document.getElementById("lang").value;

  let response = await fetch("https://api.mymemory.translated.net/get?q=" + text + "&langpair=de|" + lang);
  let data = await response.json();

  document.getElementById("output").innerText =
    data.responseData.translatedText;
}
</script>

</body>
</html>
