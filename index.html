<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Stable</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
      position: relative;
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
      white-space: pre-wrap;
    }

    /* MENU */
    .menu-icon {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
      user-select: none;
    }

    .menu {
      position: absolute;
      top: 40px;
      right: 10px;
      background: #111827;
      border-radius: 10px;
      width: 180px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .menu div {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #1f2937;
    }

    .menu div:hover {
      background: #1f2937;
    }

    .hidden {
      display: none;
    }

    /* CHAT */
    #chatBox {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 220px;
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    #chatMessages {
      height: 120px;
      overflow-y: auto;
      background: #0f172a;
      padding: 5px;
      border-radius: 5px;
      margin-bottom: 5px;
    }

    #chatInput {
      width: 100%;
      margin-top: 5px;
      padding: 5px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- MENU -->
  <div class="menu-icon" onclick="toggleMenu()">|||</div>

  <div id="menu" class="menu hidden">
    <div onclick="openSettings()">Settings</div>
    <div onclick="openLogin()">Login</div>
    <div onclick="openSupport()">Help & Support</div>
    <div onclick="openRules()">Regeln</div>
  </div>

  <h2>Ultra Translator 50 Stable</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<!-- CHAT -->
<div id="chatBox">
  <div><b>💬 Tipps</b></div>

  <div id="chatMessages"></div>

  <input id="chatInput" placeholder="Tipp schreiben..." />
  <button onclick="sendChat()">Senden</button>
</div>

<script>

let lastResult = "";

/* 🌍 50 Sprachen */
const languages = {
  en:"Englisch", de:"Deutsch", fr:"Französisch", es:"Spanisch",
  it:"Italienisch", pt:"Portugiesisch", ru:"Russisch", zh:"Chinesisch",
  ja:"Japanisch", ko:"Koreanisch", ar:"Arabisch", hi:"Hindi",
  fa:"Persisch", ur:"Urdu", bn:"Bengalisch", tr:"Türkisch",
  vi:"Vietnamesisch", id:"Indonesisch", pl:"Polnisch", uk:"Ukrainisch",
  nl:"Niederländisch", el:"Griechisch", sv:"Schwedisch", da:"Dänisch",
  fi:"Finnisch", no:"Norwegisch", cs:"Tschechisch", ro:"Rumänisch",
  hu:"Ungarisch", he:"Hebräisch", th:"Thailändisch", ms:"Malaiisch",
  tl:"Filipino", sw:"Swahili", ta:"Tamil", te:"Telugu",
  ml:"Malayalam", kn:"Kannada", pa:"Punjabi", mr:"Marathi",
  ne:"Nepalesisch", si:"Singhalesisch", my:"Burmesisch", km:"Khmer",
  lo:"Laotisch", am:"Amharisch", az:"Aserbaidschanisch", so:"Somali",
  zu:"Zulu", yo:"Yoruba"
};

/* LOAD */
function loadLanguages(){
  const from = document.getElementById("fromLang");
  const to = document.getElementById("toLang");

  from.innerHTML = "";
  to.innerHTML = "";

  for(let code in languages){
    from.add(new Option(languages[code], code));
    to.add(new Option(languages[code], code));
  }
}

/* TRANSLATE */
async function translateText(){
  let text = document.getElementById("text").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try{
    let res = await fetch(
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=" + from + "|" + to
    );

    let data = await res.json();

    lastResult = data?.responseData?.translatedText || text;

    document.getElementById("output").innerText = lastResult;

  }catch(e){
    document.getElementById("output").innerText = "Übersetzung Fehler";
  }
}

/* 🔥 VEREINFACHEN (UNGEKÜRZT + STARK) */
function simplifyText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let sentences = text.split(".").map(s => s.trim()).filter(Boolean);

  let simplified = sentences.map(s => {

    let t = s
      .replace(/sehr|wirklich|ziemlich|eigentlich|relativ|komplex/gi,"")
      .replace(/durchgeführt|implementiert|realisiert|ausgeführt/gi,"gemacht")
      .replace(/Kommunikation|Interaktion|Korrespondenz/gi,"Austausch")
      .replace(/Informationen?|Details|Daten|Aspekte/gi,"Infos")
      .replace(/\s+/g," ")
      .trim();

    if(t.length > 80){
      t = t.split(",")[0];
    }

    return t;
  });

  document.getElementById("output").innerText =
    "VEREINFACHT:\n\n" + simplified.join(". ");
}

/* 🔥 ZUSAMMENFASSEN (keine harte Limitierung mehr) */
function summarizeText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let sentences = text.split(".").map(s => s.trim()).filter(Boolean);

  let keep = Math.max(1, Math.ceil(sentences.length * 0.35));

  let summary = sentences.slice(0, keep);

  document.getElementById("output").innerText =
    "ZUSAMMENFASSUNG:\n\n" + summary.join(". ") + ".";
}

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("hidden");
}

function openSettings(){
  document.getElementById("output").innerText =
    "Settings:\n- Sprache\n- UI Optionen\n- zukünftige Updates";
}

function openLogin(){
  document.getElementById("output").innerText = "Login (Demo)";
}

function openSupport(){
  document.getElementById("output").innerText = "Support Bereich";
}

function openRules(){
  document.getElementById("output").innerText =
    "Regeln:\n- Text eingeben\n- Sprache wählen\n- Funktion nutzen";
}

/* 💬 CHAT (SPEICHERT JETZT WIRKLICH) */
function sendChat(){
  let input = document.getElementById("chatInput");
  let msg = input.value.trim();

  if(!msg) return;

  let messages = JSON.parse(localStorage.getItem("chatMessages") || "[]");

  messages.push(msg);

  localStorage.setItem("chatMessages", JSON.stringify(messages));

  input.value = "";

  loadChat();
}

function loadChat(){
  let box = document.getElementById("chatMessages");
  box.innerHTML = "";

  let messages = JSON.parse(localStorage.getItem("chatMessages") || "[]");

  messages.forEach(msg => {
    let div = document.createElement("div");
    div.innerText = "💡 " + msg;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* INIT */
document.addEventListener("DOMContentLoaded", function(){
  loadLanguages();
  loadChat();
});

</script>

</body>
</html>
