<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator</title>
</head>
<body>

<h1>Ultra Translator</h1>

<textarea id="text" placeholder="Text eingeben"></textarea>

<select id="lang">
  <option value="en">Englisch</option>
  <option value="es">Spanisch</option>
  <option value="fr">Französisch</option>
</select>

<button onclick="translateText()">Übersetzen</button>

<p id="output"></p>

<script>
async function translateText() {
  let text = document.getElementById("text").value;
  let lang = document.getElementById("lang").value;

  if (!text) {
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try {
    let response = await fetch("https://libretranslate.de/translate", {
      method: "POST",
      body: JSON.stringify({
        q: text,
        source: "de",
        target: lang,
        format: "text"
      }),
      headers: { "Content-Type": "application/json" }
    });

    let data = await response.json();

    document.getElementById("output").innerText =
      data.translatedText;

  } catch (e) {
    document.getElementById("output").innerText =
      "Fehler: Übersetzung nicht möglich";
  }
}
</script>

</body>
</html>
