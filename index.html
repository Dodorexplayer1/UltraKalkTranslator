<!DOCTYPE html>
<html>
<head>
<title>Übersetzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

#app{
display:none;
padding:20px;
max-width:1200px;
margin:auto;
}

textarea,select,button,#output{
width:100%;
box-sizing:border-box;
margin-top:10px;
border-radius:8px;
border:none;
}

textarea{
min-height:140px;
background:#111827;
color:white;
padding:10px;
}

select{
background:#111827;
color:white;
padding:10px;
}

button{
background:#3b82f6;
color:white;
padding:10px;
font-weight:bold;
cursor:pointer;
}

#output{
background:#111827;
padding:12px;
min-height:120px;
}

/* CHAT FIX */
#chatBox{
position:fixed;
bottom:140px;
right:10px;
width:320px;
height:320px;
overflow-y:auto;
background:#111827;
padding:10px;
border-radius:10px;
display:none;
}

#chatInputBox{
position:fixed;
bottom:70px;
right:10px;
width:320px;
background:#111827;
padding:10px;
border-radius:10px;
display:none;
}

#chatToggle{
position:fixed;
bottom:10px;
right:10px;
width:55px;
height:55px;
border-radius:50%;
background:#3b82f6;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}
</style>
</head>

<body>

<div id="loginScreen">
<div class="box">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="username" placeholder="Username">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
</div>

<div id="app">

<h2>Übersetzer</h2>

<textarea id="text"></textarea>

<select id="fromLang"></select>
<select id="toLang"></select>

<button onclick="translateText()">Übersetzen</button>
<button onclick="simplifyText()">Vereinfachen</button>
<button onclick="summarizeText()">Zusammenfassen</button>

<div id="output"></div>

<div id="chatBox"></div>

<div id="chatInputBox">
<input id="chatInput">
<button onclick="sendChat()">Send</button>
</div>

<div id="chatToggle" onclick="toggleChat()">💬</div>

</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
authDomain:"projekt-erstellen-dfc13.firebaseapp.com",
projectId:"projekt-erstellen-dfc13"
});

const auth=firebase.auth();
const db=firebase.firestore();
const chatRef=db.collection("chat");

let lastTranslation="";

/* AUTH */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value);
}

function register(){
auth.createUserWithEmailAndPassword(email.value,password.value);
}

/* TRANSLATE */
async function translateText(){
let res=await fetch(
"https://api.mymemory.translated.net/get?q="+
encodeURIComponent(text.value)+
"&langpair="+fromLang.value+"|"+toLang.value
);

let data=await res.json();
lastTranslation=data.responseData.translatedText;

output.innerText=lastTranslation;
}

/* SAFE BASE TEXT */
function baseText(){
return (lastTranslation && lastTranslation.trim()!=="")
? lastTranslation
: text.value;
}

/* FIX FUNCTIONS */
function simplifyText(){
output.innerText=baseText().split(".")[0];
}

function summarizeText(){
output.innerText=baseText().split(" ").slice(0,25).join(" ")+"...";
}

/* CHAT FIX STABLE */
function loadChat(){
chatRef.orderBy("time").onSnapshot(snap=>{
const box=document.getElementById("chatBox");

const atBottom =
box.scrollTop + box.clientHeight >= box.scrollHeight - 10;

box.innerHTML="";

snap.forEach(d=>{
let div=document.createElement("div");
div.innerText=d.data().user+": "+d.data().text;
box.appendChild(div);
});

/* FIX: guaranteed scroll */
setTimeout(()=>{
if(atBottom){
box.scrollTop = box.scrollHeight;
}
},50);

});
}

/* SEND CHAT */
function sendChat(){
chatRef.add({
text:chatInput.value,
user:username.value || "user",
time:Date.now()
});
chatInput.value="";
}

/* CHAT TOGGLE FIX */
let chatOpen=false;

function toggleChat(){
chatOpen=!chatOpen;

chatBox.style.display=chatOpen?"block":"none";
chatInputBox.style.display=chatOpen?"block":"none";

if(chatOpen){
setTimeout(()=>chatBox.scrollTop=chatBox.scrollHeight,50);
}
}

/* 120+ LANGUAGES STABLE */
const languages={
en:"English",de:"Deutsch",fr:"Français",es:"Español",it:"Italiano",
pt:"Português",ru:"Русский",zh:"中文",ja:"日本語",ko:"한국어",
ar:"العربية",hi:"हिन्दी",tr:"Türkçe",nl:"Nederlands",pl:"Polski",
uk:"Українська",sv:"Svenska",da:"Dansk",fi:"Suomi",no:"Norsk",
cs:"Čeština",ro:"Română",hu:"Magyar",he:"עברית",th:"ไทย",
vi:"Tiếng Việt",id:"Bahasa Indonesia",ms:"Bahasa Melayu",tl:"Filipino",
bg:"Български",hr:"Hrvatski",sr:"Српски",sk:"Slovenčina",
sl:"Slovenščina",lt:"Lietuvių",lv:"Latviešu",et:"Eesti",
sq:"Shqip",mk:"Македонски",bs:"Bosanski",
am:"አማርኛ",sw:"Kiswahili",zu:"isiZulu",fa:"فارسی",ur:"اردو"
};

/* LOAD LANGS */
for(let l in languages){
fromLang.add(new Option(languages[l],l));
toLang.add(new Option(languages[l],l));
}

/* AUTO LOGIN CHECK */
auth.onAuthStateChanged(u=>{
if(u){
loginScreen.style.display="none";
app.style.display="block";
loadChat();
}
});

</script>

</body>
</html>
